name: Python Tests

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main", "develop"]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: python -m unittest discover -s . -p "test*.py"
